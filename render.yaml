# Render Blueprint — deploy from dashboard: New → Blueprint → connect repo
# Free tier: web service spins down after 15 min idle (~1 min cold start).
# Use Turso (free) for persistent DB — see README deploy section.

services:
  - type: web
    name: agntpymt
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SIMULATE_PAYMENTS
        value: true
      - key: DEMO_TRANSACTION_FEE_USD
        value: "0.01"
      - key: VITE_API_URL
        value: ""
      - key: VITE_APP_NAME
        value: AgntPymt MVP Demo
      - key: DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
