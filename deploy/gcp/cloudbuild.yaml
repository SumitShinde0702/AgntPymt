# Cloud Build → Artifact Registry → Cloud Run
# Usage: gcloud builds submit --config deploy/gcp/cloudbuild.yaml

substitutions:
  _REGION: asia-southeast1
  _SERVICE: agntpymt
  _REPOSITORY: agntpymt
  _SQL_INSTANCE: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - --build-arg
      - VITE_CLERK_PUBLISHABLE_KEY=$_VITE_CLERK_PUBLISHABLE_KEY
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=300
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --set-env-vars=NODE_ENV=production,HERMES_HOME=/tmp/hermes
      - --set-secrets=DATABASE_URL=agntpymt-database-url:latest,CLERK_SECRET_KEY=agntpymt-clerk-secret:latest,HERMES_API_KEY=agntpymt-hermes-api-key:latest,AGNTPYMT_MCP_KEY=agntpymt-mcp-key:latest,OPENAI_API_KEY=agntpymt-openai-key:latest
      - --update-env-vars=GCS_PROFILE_BUCKET=$PROJECT_ID-agntpymt-profiles,AGNTPYMT_PUBLIC_URL=https://agntpymt-PLACEHOLDER.run.app

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
