services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agntpymt
      POSTGRES_PASSWORD: agntpymt
      POSTGRES_DB: agntpymt
    ports:
      - "5432:5432"
    volumes:
      - agntpymt_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agntpymt -d agntpymt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agntpymt_pg:
